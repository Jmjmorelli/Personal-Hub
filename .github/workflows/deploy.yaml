name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install cloudflared on Runner
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Cloudflare SSH Bridge
        env:
          CF_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          cloudflared access tcp --hostname "$SERVER_HOST" --url localhost:2222 \
            --header "CF-Access-Client-Id=$CF_CLIENT_ID" \
            --header "CF-Access-Client-Secret=$CF_CLIENT_SECRET" &

          sleep 3

      - name: SSH into Ubuntu Server & Deploy
        uses: appleboy/ssh-action@master
        with:
          host: localhost
          port: 2222
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            export PATH=$PATH:$HOME/.nvm/versions/node/$(node -v)/bin:$HOME/.config/nvm

            cd /var/www/html/morellijoseph.com/Personal-Hub/morelli
            git pull origin main
            npm i
            npm run build
            pm2 restart morelli
